apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: pawzzle
spec:
  image: python:3.12-slim
  run: |
    set -e
    pip install -r requirements.txt
    
    python app.py
  containerPort: 8000
  service:
    ports:
    - port: 8000
      targetPort: 8000
  resources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 0.5
      memory: 512Mi
  healthCheck:
    type: http
    path: /
    port: 8000